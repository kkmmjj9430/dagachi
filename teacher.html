<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교사 가이드 AI — 다가치</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .teacher-wrap { max-width: 860px; margin: 0 auto; padding: 48px 24px; }
    .form-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px 28px; margin-bottom: 20px; }
    .form-card-title { font-size: 16px; font-weight: 600; color: var(--text-dark); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .form-card-title span { background: var(--sky-light); color: var(--sky); font-size: 12px; font-weight: 500; padding: 2px 10px; border-radius: var(--radius-full); }
    .chip-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { padding: 8px 16px; border-radius: var(--radius-full); border: 1.5px solid var(--border); font-size: 13px; color: var(--text-mid); cursor: pointer; transition: all 0.15s; background: var(--white); font-family: inherit; }
    .chip:hover { border-color: var(--sky); color: var(--sky); }
    .chip.selected { background: var(--sky-light); border-color: var(--sky); color: var(--sky); font-weight: 500; }
    .submit-btn { width: 100%; padding: 16px; background: var(--sky); color: #fff; border: none; border-radius: var(--radius-full); font-size: 16px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.2s; margin-top: 8px; }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab { padding: 12px 20px; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
    .tab.active { color: var(--sky); border-bottom-color: var(--sky); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .result-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px 28px; margin-top: 24px; display: none; }
    .result-card.visible { display: block; }
    .result-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border-soft); }
    .result-header h3 { font-size: 17px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
    .result-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .result-tag { font-size: 12px; padding: 3px 10px; border-radius: var(--radius-full); }
    .guide-content { font-size: 14px; color: var(--text-mid); line-height: 2; }
    .guide-content strong { color: var(--text-dark); font-weight: 600; }
    .phrase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
    .phrase-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; }
    .phrase-situation { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .phrase-korean { font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 4px; }
    .phrase-translated { font-size: 13px; color: var(--sky); }
    .concern-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .concern-chip { padding: 8px 16px; border-radius: var(--radius-full); border: 1.5px solid var(--border); font-size: 13px; color: var(--text-mid); cursor: pointer; background: var(--white); font-family: inherit; transition: all 0.15s; }
    .concern-chip:hover { border-color: var(--purple); color: var(--purple); }
    .concern-chip.selected { background: var(--purple-light); border-color: var(--purple); color: var(--purple); font-weight: 500; }
    .concern-result { font-size: 14px; color: var(--text-mid); line-height: 2; display: none; }
    .concern-result.visible { display: block; }
    .chat-section { margin-top: 28px; border-top: 1px solid var(--border-soft); padding-top: 24px; }
    .chat-title { font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 14px; }
    .chat-messages { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; max-height: 320px; overflow-y: auto; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.7; }
    .msg.user { align-self: flex-end; background: var(--sky); color: #fff; border-radius: 14px 14px 4px 14px; }
    .msg.ai { align-self: flex-start; background: var(--bg); color: var(--text-mid); border-radius: 14px 14px 14px 4px; border: 1px solid var(--border); }
    .msg.ai strong { color: var(--text-dark); }
    .chat-input-row { display: flex; gap: 10px; }
    .chat-input { flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-full); font-size: 14px; font-family: inherit; color: var(--text-dark); background: var(--white); transition: border-color 0.2s; }
    .chat-input:focus { outline: none; border-color: var(--sky); }
    .chat-send { padding: 12px 22px; background: var(--sky); color: #fff; border: none; border-radius: var(--radius-full); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.2s; white-space: nowrap; }
    .chat-send:hover { opacity: 0.88; }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sky-mid); animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    .loading-inline { color: var(--text-muted); font-size: 13px; padding: 8px 0; }
  </style>
</head>
<body>

  <div class="page-hero">

    <h1>교사용 다문화 학생 지원 가이드</h1>
    <p>담당 학생 정보를 입력하면<br>맞춤 지도법·소통 팁·수업 표현집을 즉시 제안합니다</p>

  <div class="teacher-wrap">
    <div class="form-card">
      <div class="form-card-title">담당 학생 정보 <span>필수</span></div>
      <div class="form-group">
        <label class="form-label">학년</label>

          <button class="chip" data-val="중학교">중학교</button>

          <div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>

        <div class="chat-section" id="chat-section" style="display:none;">
          <div class="chat-title">💬 추가 질문하기</div>

          <div class="chat-input-row">
            <input type="text" class="chat-input" id="chat-input" placeholder="예) 이 학생이 수업 중 갑자기 운다면 어떻게 해야 하나요?" />

        <div class="concern-chips" id="concern-chips">
          <button class="concern-chip" data-val="공부·성적 문제">📚 공부·성적 문제</button>
          <button class="concern-chip" data-val="친구 관계 어려움">👥 친구 관계 어려움</button>
          <button class="concern-chip" data-val="진로·미래 불안">🎯 진로·미래 불안</button>
          <button class="concern-chip" data-val="언어 장벽으로 인한 소외감">🗣️ 언어 장벽·소외감</button>
          <button class="concern-chip" data-val="가족 문제·문화 충돌">🏠 가족 문제·문화 충돌</button>
          <button class="concern-chip" data-val="정체성 혼란">🪞 정체성 혼란</button>

  <script>
  const API_KEY = 'AIzaSyDVDjNADSd9txAxkIFJ63a2_FpadGaaedE'; 
  const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';

  let isRequesting = false;
  let phraseGenerated = false;

  const state = { grade: '', lang: '', level: '', type: '' };
  let chatHistory = [];
  let systemContext = '';
  let guideGenerated = false;

  // 1. 503 에러 발생 시 자동으로 재시도하는 안전장치 함수
  async function fetchWithRetry(url, options, retries = 3, delay = 1500) {
    for (let i = 0; i < retries; i++) {
      try {
        const res = await fetch(url, options);
        if (res.status === 503 || res.status === 429) {
          if (i === retries - 1) return res; 
          console.warn(`구글 서버가 바쁩니다. ${delay}ms 후 다시 시도합니다. (${i + 1}/${retries})`);
          await new Promise(resolve => setTimeout(resolve, delay));
          continue;
        }
        return res;
      } catch (err) {
        if (i === retries - 1) throw err;
        await new Promise(resolve => setTimeout(resolve, delay));
      }
    }
  }

  function setupChip(groupId, key) {
    document.getElementById(groupId).querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById(groupId).querySelectorAll('.chip').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        state[key] = btn.dataset.val;
        checkReady();
      });
    });
  }
  setupChip('grade-group', 'grade');
  setupChip('lang-group', 'lang');
  setupChip('level-group', 'level');
  setupChip('type-group', 'type');

  function checkReady() {
    document.getElementById('generate-btn').disabled = !(state.grade && state.lang && state.level);
    phraseGenerated = false;
    document.getElementById('phrase-content').innerHTML = '<p class="loading-inline">가이드 생성 후 💬 수업 표현집 탭을 클릭하면 생성됩니다.</p>';
    document.getElementById('concern-result').innerHTML = '';
    guideGenerated = false;
    document.getElementById('guide-content').innerHTML = '';
    document.getElementById('chat-section').style.display = 'none';
    document.getElementById('result-card').classList.remove('visible');
  }

  // 탭 전환
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      if (tab.dataset.tab === 'phrase' && guideGenerated && !phraseGenerated) {
        phraseGenerated = true;
        generatePhrases();
      }
    });
  });

  // 2. 가이드 생성
  document.getElementById('generate-btn').addEventListener('click', async () => {
    if (isRequesting) return;
    isRequesting = true;
    const btn = document.getElementById('generate-btn');
    btn.disabled = true;
    btn.textContent = '생성 중...';

    document.getElementById('result-card').classList.add('visible');
    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });

    document.getElementById('result-tags').innerHTML = `
      <span class="result-tag" style="background:var(--sky-light);color:var(--sky);">${state.grade}</span>
      <span class="result-tag" style="background:var(--purple-light);color:var(--purple);">${state.lang}</span>
      <span class="result-tag" style="background:#E0F2FE;color:#0284C7;">${state.level}</span>
      ${state.type ? `<span class="result-tag" style="background:#E8F5E9;color:#2E7D32;">${state.type}</span>` : ''}
    `;

    systemContext = `당신은 다문화 교육 전문가이자 베테랑 교사 멘토입니다.
${state.lang}권 ${state.grade} 다문화 학생(한국어 ${state.level} 수준${state.type ? ', '+state.type : ''})을 담당한 교사에게 실질적인 지도 조언을 제공합니다.
현장에서 바로 적용 가능한 구체적인 방법을 제안하고, ${state.lang} 문화에 대한 이해를 바탕으로 조언하세요.
한국어로 답변하세요.`;

    const guidePrompt = `${state.lang}권 ${state.grade} 다문화 학생(한국어 ${state.level}${state.type ? ', '+state.type : ''}) 담당 교사 지도 가이드. 각 항목 핵심만 1~2문장씩:

🎯 문화 이해 (2가지)
📝 수업 지도법 (2가지)
🤝 소통 팁 (2가지)
⚠️ 주의할 문화 차이 (2가지)
🏫 가정 연계 (1가지)`;

    try {
      const res = await fetchWithRetry(`${GEMINI_URL}?key=${API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: guidePrompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 3000 }
        })
      });

      if (!res.ok) throw new Error(`서버 에러 (${res.status})`);

      const data = await res.json();
      const guideText = data.candidates?.[0]?.content?.parts?.[0]?.text || '응답을 받지 못했습니다.';
      document.getElementById('guide-content').innerHTML = formatText(guideText);
      document.getElementById('chat-section').style.display = 'block';
      chatHistory = [
        { role: 'user', parts: [{ text: guidePrompt }] },
        { role: 'model', parts: [{ text: guideText }] }
      ];
      guideGenerated = true;
      btn.textContent = '✓ 가이드 생성 완료';
    } catch (err) {
      document.getElementById('guide-content').innerHTML = `<span style="color:#e53e3e">오류가 발생했습니다. 잠시 후 다시 시도해 주세요. (${err.message})</span>`;
      btn.disabled = false;
      btn.textContent = '다시 시도하기';
    } finally {
      isRequesting = false;
    }
  });

  // 3. 표현집 생성
  async function generatePhrases() {
    if (isRequesting) {
      document.getElementById('phrase-content').innerHTML = '<p class="loading-inline">⏳ 잠시 후 다시 클릭해주세요.</p>';
      phraseGenerated = false;
      return;
    }
    isRequesting = true;
    let text = '[]';
    document.getElementById('phrase-content').innerHTML = '<p class="loading-inline">표현집 생성 중...</p>';

    const phrasePrompt = `다음 6가지 상황에 대해 교사가 수업 중 사용할 한국어 표현과 ${state.lang} 번역을 작성하세요.
반드시 6개 항목 모두 작성하세요. 항목 수를 늘리거나 줄이지 마세요.

JSON 배열만 출력하세요. 설명/코드블록 금지.
[
  {"situation": "수업 시작", "korean": "자, 수업 시작할게요.", "translated": "${state.lang} 번역"},
  {"situation": "이해 확인", "korean": "이해했나요?", "translated": "${state.lang} 번역"},
  {"situation": "칭찬", "korean": "잘했어요!", "translated": "${state.lang} 번역"},
  {"situation": "주의", "korean": "조용히 해주세요.", "translated": "${state.lang} 번역"},
  {"situation": "숙제 안내", "korean": "숙제는 ~입니다.", "translated": "${state.lang} 번역"},
  {"situation": "하교", "korean": "오늘도 수고했어요!", "translated": "${state.lang} 번역"}
]
위 예시처럼 정확히 6개 항목을 작성하세요. korean과 translated 필드에 실제 표현을 넣으세요.`;

    try {
      const res = await fetchWithRetry(`${GEMINI_URL}?key=${API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: phrasePrompt }] }],
          generationConfig: { temperature: 0.3, maxOutputTokens: 1500, responseMimeType: "application/json" }
        })
      });

      if (!res.ok) throw new Error(`서버 에러 (${res.status})`);

      const data = await res.json();
      const candidate = data.candidates?.[0];
      if (!candidate) throw new Error('응답 없음');

      text = candidate.content?.parts?.[0]?.text || '[]';
      text = text.replace(/```json|```/g, '').trim(); // 정규식 정상화 완료
      text = text.replace(/\n/g, ' ').replace(/\r/g, ' ').replace(/\t/g, ' ');

      const lastBrace = text.lastIndexOf('}');
      if (lastBrace !== -1) {
        text = text.slice(0, lastBrace + 1);
        if (!text.trim().endsWith(']')) text += ']';
      }

      let phrases = JSON.parse(text);
      if (!Array.isArray(phrases)) throw new Error('배열 형식 아님');

      const html = `<div class="phrase-grid">${phrases.map(p => `
        <div class="phrase-card">
          <div class="phrase-situation">${p.situation}</div>
          <div class="phrase-korean">${p.korean}</div>
          <div class="phrase-translated">${p.translated}</div>
        </div>
      `).join('')}</div>`;
      document.getElementById('phrase-content').innerHTML = html;
    } catch (err) {
      document.getElementById('phrase-content').innerHTML = `<p style="color:#e53e3e">표현집 생성 실패. 탭을 다시 클릭해주세요.</p>`;
      phraseGenerated = false;
    } finally {
      isRequesting = false;
    }
  }

// 4. 고민 유형별 대응 (맥락 유지형으로 업그레이드)
  document.getElementById('concern-chips').querySelectorAll('.concern-chip').forEach(chip => {
    chip.addEventListener('click', async () => {
      if (!guideGenerated) {
        alert('먼저 가이드를 생성해주세요!');
        return;
      }
      if (isRequesting) {
        alert('이전 요청이 처리 중입니다. 잠시 후 다시 시도해주세요.');
        return;
      }
      document.getElementById('concern-chips').querySelectorAll('.concern-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      const concernResult = document.getElementById('concern-result');
      concernResult.classList.add('visible');
      concernResult.innerHTML = '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';

      // 💡 인공지능이 헤매지 않도록 구체적인 대상을 명시해 줍니다.
      const concernPrompt = `현재 선택된 학생은 ${state.lang}권 ${state.grade} (한국어 수준: ${state.level}) 다문화 학생입니다. 
이 학생이 현재 "${chip.dataset.val}"으로 힘들어하고 있습니다. 교사로서 어떻게 대응해야 할지 다음 서식에 맞추어 핵심만 1~2문장으로 간결하게 답변해 주세요:

🔍 원인:
💡 즉각 대응:
📅 장기 지원:
🤝 전문기관 연계 시점:`;

      try {
        // 💡 [핵심 수정] 단발성 질문이 아니라, 앞서 생성된 chatHistory에 고민 질문을 누적해서 보냅니다!
        const concernContents = [
          ...chatHistory,
          { role: 'user', parts: [{ text: concernPrompt }] }
        ];

        const res = await fetchWithRetry(`${GEMINI_URL}?key=${API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: systemContext }] },
            contents: concernContents, // 👈 히스토리를 통째로 넘겨 맥락을 유지시킵니다!
            generationConfig: { temperature: 0.5, maxOutputTokens: 2500 } // 토큰 버퍼 상향 및 온도를 낮춰 정교함 유도
          })
        });

        if (!res.ok) throw new Error(`서버 에러 (${res.status})`);

        const data = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '응답을 받지 못했습니다.';
        concernResult.innerHTML = formatText(reply);
      } catch (err) {
        concernResult.innerHTML = `<span style="color:#e53e3e">오류가 발생했습니다: ${err.message}</span>`;
      }
    });
  });

  // 5. 채팅
  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

  async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();

  if (!msg) return;

  input.value = '';

  document.getElementById('chat-send').disabled = true;

  addMessage('user', msg);

  const typingEl = addMessage(
    'ai',
    '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>'
  );

  try {

    const contents = [
      ...chatHistory,
      {
        role: 'user',
        parts: [{ text: msg }]
      }
    ];

    const res = await fetchWithRetry(`${GEMINI_URL}?key=${API_KEY}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
  system_instruction: {
    parts: [{ text: systemContext }]
  },
  contents,
  generationConfig: {
    temperature: 0.7,
    maxOutputTokens: 1000
  }
})
    });

    if (!res.ok) {
      const errText = await res.text();
      console.log(errText);
      throw new Error(`서버 에러 (${res.status})`);
    }

    const data = await res.json();

    const reply =
      data.candidates?.[0]?.content?.parts?.[0]?.text ||
      '응답 없음';

    typingEl.innerHTML = formatText(reply);

    chatHistory.push(
      {
        role: 'user',
        parts: [{ text: msg }]
      },
      {
        role: 'model',
        parts: [{ text: reply }]
      }
    );

  } catch (err) {

    typingEl.innerHTML =
      `<span style="color:#e53e3e">${err.message}</span>`;

  }

  document.getElementById('chat-send').disabled = false;
}

  function addMessage(role, html) {
    const messages = document.getElementById('chat-messages');
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.innerHTML = html;
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    return el;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // 마크다운 두꺼운 글씨 정규식 수정 완료
      .replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
